<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tune-In — My Reviews</title>
  <script>if(localStorage.getItem('tune-in-theme')==='light')document.documentElement.classList.add('light-mode');</script>
  <style>html{background:#070d18;}html.light-mode{background:#dff0ed;}</style>
  <link rel="stylesheet" href="css/reviews.css" />
</head>
<body>
  <nav class="top-nav">
    <a href="home.html" class="nav-logo">Tune-In</a>
    <div class="nav-links">
      <a href="feed.html">Feed</a>
      <a href="search.html">Search</a>
      <a href="lists.html">Lists</a>
      <a href="queue.html">Queue</a>
      <a href="reviews.html">My Reviews</a>
      <a href="profile.html">Profile</a>
    </div>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu" aria-expanded="false">☰</button>
    <button class="theme-toggle" id="theme-toggle" aria-label="Switch to light mode">☾</button>
  </nav>

  <div class="card">
    <div class="page-header">
      <h1>My Reviews</h1>
      <a href="review-new.html" class="action-btn">+ Write a Review</a>
    </div>
    <div class="search-row">
      <input type="search" id="review-search" placeholder="Search by title or artist…" />
    </div>
    <div id="reviews-list" class="reviews-list">
      <p class="empty-state">Loading your reviews...</p>
    </div>
  </div>

  <!-- Add to List modal -->
  <div id="list-modal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Add to List</h2>
        <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      </div>
      <div id="modal-lists"></div>
    </div>
  </div>

  <script type="module" src="js/reviews.js"></script>
  <script type="module" src="js/nav.js"></script>
  <script type="module" src="js/theme.js"></script>
</body>
</html>
