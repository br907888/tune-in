<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tune-In — User Profile</title>
  <script>if(localStorage.getItem('tune-in-theme')==='light')document.documentElement.classList.add('light-mode');</script>
  <style>html{background:#070d18;}html.light-mode{background:#dff0ed;}</style>
  <link rel="stylesheet" href="css/reviews.css" />
</head>
<body>
  <nav class="top-nav">
    <a href="home.html" class="nav-logo">Tune-In</a>
    <div class="nav-links">
      <a href="feed.html">Feed</a>
      <a href="search.html">Search</a>
      <a href="lists.html">Lists</a>
      <a href="queue.html">Queue</a>
      <a href="reviews.html">My Reviews</a>
      <a href="profile.html">Profile</a>
    </div>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu" aria-expanded="false">☰</button>
    <button class="theme-toggle" id="theme-toggle" aria-label="Switch to light mode">☾</button>
  </nav>

  <div class="card">
    <div class="public-profile-header">
      <div>
        <h1 id="profile-name">—</h1>
        <p class="profile-subtext" id="profile-subtext"></p>
      </div>
      <button class="follow-btn" id="follow-btn" disabled>Follow</button>
    </div>

    <div class="divider"></div>

    <h2 class="section-heading">Reviews</h2>
    <div id="reviews-list" class="reviews-list">
      <p class="empty-state">Loading reviews...</p>
    </div>

    <div class="divider" style="margin-top: 1.5rem;"></div>

    <h2 class="section-heading">Lists</h2>
    <div id="lists-list">
      <p class="empty-state">Loading lists...</p>
    </div>

    <div class="divider" style="margin-top: 1.5rem;"></div>

    <h2 class="section-heading">Listening Queue</h2>
    <div id="queue-list" class="reviews-list">
      <p class="empty-state">Loading queue...</p>
    </div>
  </div>

  <script type="module" src="js/public-profile.js"></script>
  <script type="module" src="js/nav.js"></script>
  <script type="module" src="js/theme.js"></script>
</body>
</html>
